# Functions-only deploy - skip Next.js detection
[build]
  command = "mkdir -p out && echo '<h1>Hafiz API</h1><p>Functions only. Frontend at anaskhan0607.github.io/hafiz</p>' > out/index.html"
  publish = "out"
  functions = "netlify/functions"

# Skip framework detection
[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"
